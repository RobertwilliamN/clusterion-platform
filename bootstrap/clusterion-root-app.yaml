apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clusterion-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/RobertwilliamN/clusterion-platform.git
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
