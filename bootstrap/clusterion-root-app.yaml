apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clusterion-root
  namespace: argocd

spec:
  project: clusterion

  source:
    repoURL: https://github.com/RobertwilliamN/clusterion-platform.git
    targetRevision: main
    path: apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
