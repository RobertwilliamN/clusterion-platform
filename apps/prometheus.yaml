apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 56.0.0

    helm:
      values: |
        crds:
          enabled: true

        grafana:
          adminUser: admin
          adminPassword: clusterion
          service:
            type: NodePort
          access: proxy
          url: http://observability-kube-prometh-prometheus.monitoring.svc:9090
      isDefault: true
        prometheus:
          service:
            type: NodePort

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
